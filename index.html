<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hogwarts AI - Wizarding World Knowledge Assistant" />
    <title>Hogwarts AI | Wizarding Knowledge Assistant</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Icons (optional professional touch) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>

    <!-- App Wrapper -->
    <div class="app">

        <!-- Sidebar (future scalability: history, settings) -->
        <aside class="sidebar">
            <div class="brand">
                <h1>⚡ Hogwarts AI</h1>
                <p>Wizarding Knowledge Assistant</p>
            </div>

            <nav class="menu">
                <button class="menu-item active"><i class="fa-solid fa-comment"></i> Chat</button>
                <button class="menu-item"><i class="fa-solid fa-book"></i> Spells</button>
                <button class="menu-item"><i class="fa-solid fa-user"></i> Characters</button>
                <button class="menu-item"><i class="fa-solid fa-scroll"></i> Lore</button>
            </nav>

            <div class="sidebar-footer">
                <span class="status online"></span>
                <span>Online</span>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat">

            <!-- Header -->
            <header class="chat-header">
                <div>
                    <h2>Hogwarts AI Assistant</h2>
                    <p class="subtitle">Ask anything about spells, characters, or wizarding lore</p>
                </div>
            </header>

            <!-- Messages -->
            <section id="chatWindow" class="chat-window">
                <div class="message bot">
                    <div class="avatar">🧙‍♂️</div>
                    <div class="bubble">
                        Welcome, student. The castle is listening… What would you like to learn today?
                    </div>
                </div>
            </section>

            <!-- Input Area -->
            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Ask about spells, characters, or Hogwarts secrets..."
                        autocomplete="off"
                    />
                    <button id="sendBtn" aria-label="Send message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="hint">Press Enter to send • Shift+Enter for new line</p>
            </footer>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
